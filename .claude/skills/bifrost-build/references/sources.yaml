# Reference freshness manifest
#
# Each entry maps a curated reference file to the source globs it documents
# and the git sha it was last verified against.
#
# The generated/* appendices are CI-enforced (see generate.py).
# These curated files are verified manually; `test_skill_reference_freshness`
# warns (never fails) when a source glob has commits newer than verified_at_sha.
#
# To re-verify: read the changed sources, fix the prose, then bump verified_at_sha.

references:
  - file: references/apps.md
    source_globs:
      - api/bifrost/commands/apps.py
      - client/src/lib/app-sdk/*.ts
      - client/src/lib/app-sdk/*.tsx
      - api/bifrost/manifest.py
    verified_at_sha: 236d0f4753b4b14cfc05c42dccbe9db26b411a77

